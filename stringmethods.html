<!DOCTYPE html>
<html>
<head>
    <title>String Methods Example</title>
</head>
<body>

    <h1>Open Console (F12) to See Output</h1>

    <script>

        let name = "Janhavi";

        // Convert to uppercase
        console.log("toUpperCase():", name.toUpperCase());

        // Convert to lowercase
        console.log("toLowerCase():", name.toLowerCase());

        // Find string length
        console.log("length:", name.length);

        // Get character at a specific index
        console.log("charAt(0):", name.charAt(0));

        // Check if a string contains a value
        console.log("includes('dish'):", name.includes("dish"));

    </script>

</body>
</html>
