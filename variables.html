<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Variables & Scope Demo</title>
</head>
<body>

<h1>Open Console (F12) to See Output</h1>

<script>

    console.log("===== VARIABLES =====");

    // let
    let name = "rahul";
    console.log("let before:", name);

    name = "Jay";
    console.log("let after:", name);

    // const
    const country = "India";
    console.log("const:", country);

    // var
    var city = "Pune";
    console.log("var before:", city);

    city = "Mumbai";
    console.log("var after:", city);


    console.log("===== FUNCTION SCOPE (var) =====");

    function functionScopeDemo() {

        if (true) {
            var user = "Jagdish";
        }

        // Accessible because var is function scoped
        console.log("Function Scope:", user);
    }

    functionScopeDemo();


    console.log("===== BLOCK SCOPE (let) =====");

    if (true) {

        let age = 22;

        console.log("Inside Block:", age);
    }

     //console.log(age); // Error


    console.log("===== BLOCK SCOPE (const) =====");

    if (true) {

        const pi = 3.14;

        console.log("Inside Block:", pi);
    }

    // console.log(pi); // Error


    console.log("===== OPERATORS =====");

    let a = 10;
    let b = 5;

    console.log("Addition:", a + b);
    console.log("Subtraction:", a - b);
    console.log("Multiplication:", a * b);
    console.log("Division:", a / b);
    console.log("Modulus:", a % b);



    console.log("===== CONDITIONAL STATEMENT =====");

    let marks = 75;

    if (marks >= 90) {
        console.log("Grade A");
    }
    else if (marks >= 70) {
        console.log("Grade B");
    }
    else {
        console.log("Grade C");
    }


    console.log("===== FOR LOOP =====");

    for (let i = 1; i <= 5; i++) {
        console.log(i);
    }


    console.log("===== WHILE LOOP =====");

    let i = 1;

    while (i <= 5) {
        console.log(i);
        i++;
    }


    console.log("===== DO WHILE LOOP =====");

    let j = 1;

    do {
        console.log(j);
        j++;
    }
    while (j <= 5);


    console.log("===== FOR OF LOOP =====");

    let colors = ["Red", "Blue", "Green"];

    for (let color of colors) {
        console.log(color);
    }

</script>

</body>
</html>
